<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Gerenciar Imagens - RRG Arts</title>
  <style>
    * {
      font-family: sans-serif;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00f2ff;
    }

    #filtros {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    #filtros button {
      padding: 8px 20px;
      border: 2px solid #00f2ff;
      background: transparent;
      color: #00f2ff;
      cursor: pointer;
      border-radius: 5px;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    #filtros button:hover,
    #filtros button.ativo {
      background: #00f2ff;
      color: #0a0a0a;
    }

    #status-geral {
      text-align: center;
      margin-bottom: 20px;
      color: #aaa;
      font-size: 14px;
    }

    .galeria-gerenciar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1a1a;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-categoria {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-deletar {
      background: #cc0000;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .btn-deletar:hover {
      background: #ff0000;
    }

    .btn-deletar:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #loading {
      text-align: center;
      color: #00f2ff;
      font-size: 18px;
      margin-top: 50px;
    }
  </style>
</head>

<body>
  <!-- Tela de login -->

  <div id="tela-login">
    <h1>Área Restrita</h1>
    <input type="password" id="input-senha" placeholder="Digite a senha">
    <button onclick="verificarSenha()">Entrar</button>
    <p id="erro-login"></p>
  </div>

  <div id="conteudo-gerenciar" style="display:none"></div>
  <h1>Gerenciar Imagens</h1>

  <div id="filtros">
    <button onclick="carregarImagens('tudo')" class="ativo">Tudo</button>
    <button onclick="carregarImagens('clientes')">Clientes</button>
    <button onclick="carregarImagens('estudos')">Estudos</button>
    <button onclick="carregarImagens('ia')">IA</button>
  </div>

  <p id="status-geral"></p>
  <div id="loading">Carregando imagens...</div>
  <div class="galeria-gerenciar" id="galeria"></div>

  <script>
    let categoriaAtiva = 'tudo'

    async function carregarImagens(categoria) {
      categoriaAtiva = categoria

      // Atualiza botão ativo
      document.querySelectorAll('#filtros button').forEach(btn => btn.classList.remove('ativo'))
      event.target.classList.add('ativo')

      const galeria = document.getElementById('galeria')
      const loading = document.getElementById('loading')
      const statusGeral = document.getElementById('status-geral')

      galeria.innerHTML = ''
      loading.style.display = 'block'
      statusGeral.textContent = ''

      try {
        const resposta = await fetch(`/.netlify/functions/get-images?categoria=${categoria}`)
        const urls = await resposta.json()

        loading.style.display = 'none'
        statusGeral.textContent = `${urls.length} imagem(ns) encontrada(s)`

        if (urls.length === 0) {
          galeria.innerHTML = '<p style="color:#aaa;text-align:center;grid-column:1/-1">Nenhuma imagem nesta categoria.</p>'
          return
        }

        urls.forEach(url => {
          const publicId = extrairPublicId(url)
          const cat = extrairCategoria(url)

          const card = document.createElement('div')
          card.className = 'card'
          card.innerHTML = `
            <img src="${url}" alt="arte">
            <div class="card-info">
              <span class="card-categoria">${cat}</span>
              <button class="btn-deletar" onclick="deletarImagem('${publicId}', this)">🗑 Deletar</button>
            </div>
          `
          galeria.appendChild(card)
        })

      } catch (e) {
        loading.style.display = 'none'
        statusGeral.textContent = 'Erro ao carregar imagens.'
        console.error(e)
      }
    }

    async function deletarImagem(publicId, botao) {
      if (!confirm('Tem certeza que deseja deletar esta imagem?')) return

      botao.disabled = true
      botao.textContent = 'Deletando...'

      try {
        const resposta = await fetch('/.netlify/functions/delete-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ publicId })
        })

        const dados = await resposta.json()

        if (dados.resultado === 'ok') {
          botao.closest('.card').remove()
          const total = document.querySelectorAll('.card').length
          document.getElementById('status-geral').textContent = `${total} imagem(ns) encontrada(s)`
        } else {
          botao.disabled = false
          botao.textContent = '🗑 Deletar'
          alert('Erro ao deletar imagem.')
        }
      } catch (e) {
        botao.disabled = false
        botao.textContent = '🗑 Deletar'
        alert('Erro ao deletar imagem.')
        console.error(e)
      }
    }

    function extrairPublicId(url) {
      // Extrai o public_id da URL do Cloudinary
      // Ex: https://res.cloudinary.com/dg5lzxhft/image/upload/v123/clientes/abc.png
      // Retorna: clientes/abc
      const match = url.match(/\/upload\/(?:v\d+\/)?(.+)\.[a-z]+$/i)
      return match ? match[1] : ''
    }

    function extrairCategoria(url) {
      const match = url.match(/\/upload\/(?:v\d+\/)?([^/]+)\//)
      return match ? match[1] : 'sem categoria'
    }

    // Carrega tudo ao abrir a página
    window.addEventListener('load', () => {
      document.querySelector('#filtros button').click()
    })
  </script>
  </div>
  <script>
    window.addEventListener('load', () => {
      const token = sessionStorage.getItem('token_admin')
      if (token) {
        document.getElementById('tela-login').style.display = 'none'
        document.getElementById('conteudo-gerenciar').style.display = 'block'
      }
    })

    async function verificarSenha() {
      const senha = document.getElementById('input-senha').value
      const erro = document.getElementById('erro-login')

      const resposta = await fetch('/.netlify/functions/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ senha })
      })

      const dados = await resposta.json()

      if (dados.acesso) {
        sessionStorage.setItem('token_admin', dados.token)
        document.getElementById('tela-login').style.display = 'none'
        document.getElementById('conteudo-gerenciar').style.display = 'block'
      } else {
        erro.textContent = 'Senha incorreta!'
        erro.style.color = 'red'
      }
    }
  </script>
</body>

</html>
